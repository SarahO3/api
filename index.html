<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Api fetch Gifs</title>
</head>
<body>
    
   <input id="searchInput" placeholder="Search Gifs...">
   <button id="search-btn">Search</button>
   <button id="random-btn" type="button">Fetch a random gif</button>
   <br><br>
   <img src="#" alt="Gif" width="300px">
   <p style="color: red;"></p>

<script>
const searchInput = document.querySelector("#searchInput");
const searchBtn = document.querySelector('#search-btn');
const randomBtn = document.querySelector('#random-btn');
const img = document.querySelector("img");
const errorP = document.querySelector('p');

const apiKey = "dU6pTtBhaTxZRJn89CS6R4CSwNyzNlis";

// async function get gif
    async function getGif(searchTerm = "random"){
        let url = searchTerm === "random" ?
                      `https://api.giphy.com/v1/gifs/random?api_key=${apiKey}`
                    : `https://api.giphy.com/v1/gifs/search?api_key=${apiKey}&q=${searchTerm}&limit=1`;
    
    
        const response = await fetch(url);
        if(!response.ok){
            throw new Error(`HTTP Error: Status${response.status}`)
        }
        const json = await response.json()

                console.log("API Response:")
                console.dir(json)
                return json
                }

// function extract gif url based on search term which could be random or dynamic
function extractGifUrl(response, searchTerm){

    if(searchTerm === "random"){
        return response.data.images.original.url
}
if(response.data.length === 0){
    throw new Error("No gif found")
}
return response.data[0].images.original.url
}


// 3. display gif function
function displayGif(url){
    img.src = url
}

// 4. show error function
function showError(message){
    errorP.textContent = message
}

// 5. loadGif function..async in try catch block
async function loadGif(searchTerm = "random"){
    try{
        showError("")

        const response = await getGif(searchTerm)
        const gifUrl = extractGifUrl(response, searchTerm)
        displayGif(gifUrl)

    }catch(error){
        showError(error.message)
        console.error(error)
    }
}


randomBtn.addEventListener("click", () => {
    loadGif()
})

searchBtn.addEventListener("click", () => {
    loadGif(searchInput.value)
})


loadGif()
</script>

</body>
</html>
